name: PadelPulse
options:
  bundleIdPrefix: com.padelpulse
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  developmentLanguage: en
  knownRegions:
    - en
    - de
    - es

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"  # iPhone + iPad (Universal)
    GENERATE_INFOPLIST_FILE: "NO"
    # Personal development team — pinned here so xcodegen regenerations
    # don't wipe it out of the .xcodeproj every time. Required for
    # on-device installs (simulator builds don't care).
    DEVELOPMENT_TEAM: P38L5RD8CU
    CODE_SIGN_STYLE: Automatic

targets:
  PadelPulse:
    type: application
    platform: iOS
    sources:
      - PadelPulse
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.padelpulse.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: PadelPulse/Info.plist

  PadelPulseTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - PadelPulseTests
    dependencies:
      - target: PadelPulse
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
