name: PadelPulse
options:
  bundleIdPrefix: com.padelpulse
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  developmentLanguage: en
  knownRegions:
    - en
    - de
    - es

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"  # iPhone + iPad (Universal)
    INFOPLIST_KEY_UIRequiresFullScreen: "YES"
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
    INFOPLIST_KEY_NSCameraUsageDescription: "Camera access is needed to record your padel matches from courtside."
    INFOPLIST_KEY_NSMicrophoneUsageDescription: "Microphone access is needed to record audio with your match videos."
    INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "Photo library access is needed to save your recorded match videos."

targets:
  PadelPulse:
    type: application
    platform: iOS
    sources:
      - PadelPulse
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.padelpulse.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: "YES"
    info:
      path: PadelPulse/Info.plist
      properties:
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen:
          UIColorName: DarkBg
          UIImageName: LaunchLogo

  PadelPulseTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - PadelPulseTests
    dependencies:
      - target: PadelPulse
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
